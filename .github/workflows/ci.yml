name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # 使っている JS アクションはまだ Node 20 で動く(GitHub が非推奨化)。
  # これで全 JS アクションを今すぐ Node 24 で実行し、警告を消す。
  # Node 24 が既定化される 2026-06-16 までの公式の切り替えスイッチ。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: |
          # golangci-lint must be built with the same Go toolchain this module
          # targets (go.mod = 1.25). The action's prebuilt binary was still on
          # Go 1.24 and refused to run ("can't load config: ... lower than the
          # targeted Go version"), so we build it from source with our toolchain.
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...
