name: Run

on:
  # 自動実行(cron)は停止中。再開するには次の2行のコメントを外す。
  # schedule:
  #   - cron: "0 22 * * *"   # UTC基準: 22:00 UTC = 翌07:00 JST
  workflow_dispatch: {}      # 手動実行のみ(Actions → Run → Run workflow)

permissions:
  contents: read
  packages: write

env:
  # 使っている JS アクションはまだ Node 20 で動く(GitHub が非推奨化)。
  # これで全 JS アクションを今すぐ Node 24 で実行し、警告を消す。
  # Node 24 が既定化される 2026-06-16 までの公式の切り替えスイッチ。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          #github.repository = "kaisei0326/cost-aware-note-summarizer"

  summarize:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Restore dedup DB
        uses: actions/cache@v4
        with:
          path: data
          key: summarizer-db-${{ github.run_id }}
          restore-keys: |
            summarizer-db-

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run summarizer
        run: |
          mkdir -p data
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -e DISCORD_WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -e MAX_ARTICLES_PER_RUN=5 \
            -v "$(pwd)/data:/data" \
            ghcr.io/${{ github.repository }}:latest
